name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    defaults:
      run:
        working-directory: ./share-notes-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./share-notes-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/share_notes_test
          JWT_SECRET: test-jwt-secret-github-actions
          NODE_ENV: test

  frontend:
    name: Frontend - Typecheck, Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./share-notes-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./share-notes-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run linter
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

  e2e:
    name: Frontend - Playwright E2E
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./share-notes-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: ./share-notes-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:4000

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          VITE_API_URL: http://localhost:4000

  deploy:
    name: Deploy to Production
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy (Backend)
        env:
          DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
        run: curl -X POST "$DEPLOY_URL"

      - name: Trigger Render Deploy (Frontend)
        env:
          DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: curl -X POST "$DEPLOY_URL"
